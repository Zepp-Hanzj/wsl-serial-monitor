<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="16" fill="#1e1e1e"/>
  <rect x="8" y="8" width="112" height="112" rx="12" fill="#252526" stroke="#3c3c3c" stroke-width="2"/>
  <!-- Terminal/serial icon -->
  <rect x="24" y="24" width="80" height="56" rx="6" fill="#1a1a2e" stroke="#4ec9b0" stroke-width="2"/>
  <!-- Terminal prompt lines -->
  <text x="32" y="42" font-family="monospace" font-size="11" fill="#4ec9b0">COM7 &gt;</text>
  <rect x="32" y="48" width="60" height="2" rx="1" fill="#569cd6"/>
  <rect x="32" y="54" width="45" height="2" rx="1" fill="#d4d4d4" opacity="0.7"/>
  <rect x="32" y="60" width="55" height="2" rx="1" fill="#d4d4d4" opacity="0.5"/>
  <rect x="32" y="66" width="35" height="2" rx="1" fill="#d4d4d4" opacity="0.3"/>
  <!-- Cable/connector -->
  <rect x="56" y="82" width="16" height="8" rx="2" fill="#4ec9b0"/>
  <line x1="64" y1="90" x2="64" y2="108" stroke="#4ec9b0" stroke-width="3" stroke-linecap="round"/>
  <!-- WSL indicator -->
  <text x="80" y="108" font-family="sans-serif" font-size="10" font-weight="bold" fill="#569cd6">WSL</text>
</svg>
